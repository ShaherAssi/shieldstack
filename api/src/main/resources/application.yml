server:
  port: 8080

spring:
  datasource:
    url: jdbc:postgresql://localhost:5432/shieldstack
    username: postgres
    password: postgres

  jpa:
    hibernate:
      ddl-auto: validate
    properties:
      hibernate.format_sql: true

  flyway:
    enabled: true
    locations: classpath:db/migration

  security:
    user:
      name: none
      password: none

  logging:
  level:
    org.springframework.security: DEBUG
    org.springframework.web: DEBUG



  # logging:
  #   level:
  #     org.springframework: INFO
